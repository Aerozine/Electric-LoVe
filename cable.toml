# The datasheet cable has two power cores and one 9.7 mm fibre unit. The
# ELEC0041 assignment asks for a three-phase system. Three 9.7 mm power cores
# already occupy the 21 mm lay-up, so the generated model keeps the power-core
# and armour/sheath data and omits the fibre unit as a geometry simplification.
phase_count = 3

